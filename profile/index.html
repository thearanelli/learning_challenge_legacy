<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Builder Profile — GripTape</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── SHARED ──────────────────────────────────────────────────────────── */

    body { font-family: 'DM Sans', sans-serif; background: #001722;
      color: #fff; margin: 0; padding: 0; min-height: 100vh; }

    /* ── SIMPLE LAYOUT (fallback) ───────────────────────────────────────── */

    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }

    .wordmark {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 2.5rem;
    }

    /* Not-found state */
    .not-found {
      text-align: center;
      padding: 4rem 0;
      color: #888;
    }
    .not-found h1 {
      font-size: 1.25rem;
      font-weight: 500;
    }

    /* Profile card */
    .profile-header {
      margin-bottom: 2rem;
    }
    .profile-header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 0.4rem;
    }
    .member-since {
      font-size: 0.9rem;
      color: #666;
    }

    /* Status badge */
    .status-badge {
      display: inline-block;
      padding: 0.3rem 0.75rem;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      background: #e8f5e9;
      color: #2e7d32;
      margin-bottom: 2rem;
    }

    /* Answer sections */
    .section {
      margin-bottom: 1.75rem;
    }
    .section-label {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 0.4rem;
    }
    .section-body {
      font-size: 1rem;
      line-height: 1.65;
      color: #222;
    }

    /* Divider */
    .divider {
      border: none;
      border-top: 1px solid #e5e5e2;
      margin: 2rem 0;
    }

    /* Locked sections */
    .locked-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .locked-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem 1.25rem;
      background: #f0f0ee;
      border-radius: 8px;
      color: #aaa;
    }
    .lock-icon {
      font-size: 1rem;
      flex-shrink: 0;
    }
    .locked-label {
      font-size: 0.9rem;
      font-weight: 500;
    }

    /* ── TRADING CARD LAYOUT ─────────────────────────────────────────────── */

    .card-page { max-width: 480px; margin: 0 auto; padding: 32px 24px;
      display: flex; flex-direction: column; align-items: center;
      min-height: 100vh; }

    .nav-row { width: 100%; display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 8px; }

    .gt-logo { height: 22px; }

    .program-label { font-size: 9px; letter-spacing: 0.14em;
      color: rgba(255,255,255,0.3); text-transform: uppercase; }

    .top-rule { width: 100%; border: none;
      border-top: 1px solid rgba(255,255,255,0.07); margin: 16px 0 24px; }

    .access-row { width: 100%; display: flex; align-items: center;
      gap: 10px; margin-bottom: 24px; }

    .access-line { flex: 1; height: 1px; background: rgba(234,83,41,0.3); }

    .access-pill { background: rgba(234,83,41,0.12);
      border: 1px solid rgba(234,83,41,0.35); color: #EA5329;
      font-size: 9px; font-weight: 700; letter-spacing: 0.18em;
      padding: 5px 12px; border-radius: 999px;
      text-transform: uppercase; white-space: nowrap; }

    .trading-card { background: #0a2230;
      border: 1px solid rgba(255,255,255,0.08);
      border-top: 3px solid var(--accent); border-radius: 14px;
      padding: 24px 22px; width: 100%; }

    .card-archetype { font-size: 9px; font-weight: 700;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 8px; }

    .card-name { font-size: 26px; font-weight: 800; color: #fff;
      font-family: 'Outfit', sans-serif; line-height: 1.05;
      margin-bottom: 3px; }

    .card-passion-title { font-size: 12px; color: #F79227;
      font-weight: 500; margin-bottom: 16px; }

    .passion-row { display: flex; align-items: center; gap: 8px;
      margin-bottom: 20px; }

    .passion-label { font-size: 9px; letter-spacing: 0.12em;
      text-transform: uppercase; color: rgba(255,255,255,0.3); }

    .passion-val { font-size: 11px; font-weight: 600;
      color: rgba(255,255,255,0.85);
      background: rgba(247,146,39,0.1);
      border: 1px solid rgba(247,146,39,0.25);
      padding: 3px 10px; border-radius: 999px; }

    .card-rule { border: none;
      border-top: 1px solid rgba(255,255,255,0.07); margin: 0 0 18px; }

    .card-desc { font-size: 12px; color: rgba(255,255,255,0.6);
      line-height: 1.75; font-style: italic; }

    .card-desc-opener { color: rgba(255,255,255,0.9);
      font-style: normal; font-weight: 600; }

    .journey-section { width: 100%; margin-top: 18px; }

    .journey-label { font-size: 9px; letter-spacing: 0.14em;
      text-transform: uppercase; color: rgba(255,255,255,0.25);
      margin-bottom: 8px; }

    .journey-item { display: flex; justify-content: space-between;
      align-items: center; border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px; padding: 9px 12px; margin-bottom: 5px; }

    .journey-left { font-size: 11px; color: rgba(255,255,255,0.35); }

    .journey-right { font-size: 9px; color: rgba(255,255,255,0.18); }

    .card-footer { text-align: center; margin-top: 20px; font-size: 8px;
      letter-spacing: 0.12em; color: rgba(255,255,255,0.15);
      text-transform: uppercase; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    function formatDate(isoString) {
      if (!isoString) return '';
      const d = new Date(isoString);
      return d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
    }

    function statusLabel(screening_status) {
      const early = ['submitted', 'screening'];
      if (early.includes(screening_status)) return 'Application received';
      return '10 days in progress';
    }

    function renderNotFound() {
      document.body.style.background = '#f9f9f7';
      document.getElementById('app').innerHTML = `
        <div class="container">
          <div class="wordmark">GripTape</div>
          <div class="not-found">
            <h1>Profile not found</h1>
          </div>
        </div>`;
    }

    function renderProfile(data, card) {
      const { first_name, screening_status, submitted_at, application_responses } = data;
      const responses = application_responses || {};

      document.title = `${first_name}'s Builder Profile — GripTape`;

      if (card) {
        renderTradingCard(first_name, screening_status, submitted_at, responses, card);
      } else {
        renderSimple(first_name, screening_status, submitted_at, responses);
      }
    }

    function renderTradingCard(first_name, screening_status, submitted_at, responses, card) {
      document.title = first_name + "'s Builder Profile — GripTape";
      document.body.style.background = '#001722';
      document.body.style.setProperty('--accent', card.archetype_color);

      // Split archetype_description into opener + rest
      const desc = card.archetype_description || '';
      const firstPeriod = desc.indexOf('. ');
      let opener, rest;
      if (firstPeriod !== -1) {
        opener = desc.slice(0, firstPeriod + 1);
        rest = desc.slice(firstPeriod + 2);
      } else {
        opener = desc;
        rest = '';
      }

      document.getElementById('app').innerHTML = `
        <div class="card-page">
          <div class="nav-row">
            <img class="gt-logo" src="https://cdn.prod.website-files.com/640b7fef2e2b16effc0a7b1e/644b06fda43c9cdfce2ddd1c_Griptape_wordmark.png" alt="GripTape" />
            <div class="program-label">Learning Challenge &middot; NYC 2026</div>
          </div>
          <hr class="top-rule" />
          <div class="access-row">
            <div class="access-line"></div>
            <div class="access-pill">Builder Access Granted</div>
            <div class="access-line"></div>
          </div>
          <div class="trading-card">
            <div class="card-archetype">${escapeHtml(card.archetype)}</div>
            <div class="card-name">${escapeHtml(first_name)}</div>
            <div class="card-passion-title">${escapeHtml(card.passion_title)}</div>
            <div class="passion-row">
              <div class="passion-label">Passion</div>
              <div class="passion-val">${escapeHtml(card.badge)} ${escapeHtml(card.passion_title)}</div>
            </div>
            <hr class="card-rule" />
            <div class="card-desc">
              <span class="card-desc-opener">${escapeHtml(opener)}</span>
              ${rest ? ' ' + escapeHtml(rest) : ''}
            </div>
          </div>
          <div class="journey-section">
            <div class="journey-label">Your Journey</div>
            <div class="journey-item">
              <div class="journey-left">&#128274; Declaration</div>
              <div class="journey-right">Coming soon</div>
            </div>
            <div class="journey-item">
              <div class="journey-left">&#128274; First Drop</div>
              <div class="journey-right">Coming soon</div>
            </div>
            <div class="journey-item">
              <div class="journey-left">&#128274; Champion</div>
              <div class="journey-right">Coming soon</div>
            </div>
          </div>
          <div class="card-footer">GripTape Learning Challenge &middot; Accepted Cohort &middot; NYC 2026</div>
        </div>`;
    }

    function renderSimple(first_name, screening_status, submitted_at, responses) {
      document.getElementById('app').innerHTML = `
        <div class="container">
          <div class="wordmark">GripTape</div>

          <div class="profile-header">
            <h1>${escapeHtml(first_name)}'s Builder Profile</h1>
            <p class="member-since">Member since ${formatDate(submitted_at)}</p>
          </div>

          <div class="section">
            <div class="section-label">Passion</div>
            <div class="section-body">${escapeHtml(responses.passion || '')}</div>
          </div>

          <div class="section">
            <div class="section-label">Why GripTape</div>
            <div class="section-body">${escapeHtml(responses.why_join || '')}</div>
          </div>

          <span class="status-badge">${escapeHtml(statusLabel(screening_status))}</span>

          <hr class="divider" />

          <div class="locked-list">
            <div class="locked-item">
              <span class="lock-icon">&#128274;</span>
              <span class="locked-label">Declaration — coming soon</span>
            </div>
            <div class="locked-item">
              <span class="lock-icon">&#128274;</span>
              <span class="locked-label">First Drop — coming soon</span>
            </div>
            <div class="locked-item">
              <span class="lock-icon">&#128274;</span>
              <span class="locked-label">Champion — coming soon</span>
            </div>
          </div>
        </div>`;
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function escapeAttr(str) {
      return String(str).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    async function init() {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');

      if (!token) {
        renderNotFound();
        return;
      }

      try {
        const res = await fetch(`/api/profile?token=${encodeURIComponent(token)}`);
        if (!res.ok) {
          renderNotFound();
          return;
        }
        const json = await res.json();
        if (!json.found) {
          renderNotFound();
          return;
        }
        renderProfile(json.data, json.card);
      } catch {
        renderNotFound();
      }
    }

    init();
  </script>
</body>
</html>
