<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orientation Call — GripTape Learning Challenge</title>
  <style>
    body { font-family: sans-serif; max-width: 540px; margin: 60px auto; padding: 0 20px; color: #222; }
    h1 { font-size: 1.4rem; margin-bottom: 8px; }
    p { line-height: 1.6; color: #444; }
    label { display: block; margin-top: 20px; font-weight: 600; }
    select, textarea { width: 100%; margin-top: 6px; padding: 10px; font-size: 1rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    textarea { min-height: 100px; resize: vertical; }
    button { margin-top: 24px; padding: 12px 24px; font-size: 1rem; background: #1a1a1a; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #status { margin-top: 16px; font-size: 0.95rem; }
    .error { color: #c00; }
    .warning { color: #856404; background: #fff3cd; border: 1px solid #ffc107; padding: 12px; border-radius: 4px; line-height: 1.5; }
    #state-loading, #state-invalid, #state-form, #state-success { display: none; }
  </style>
</head>
<body>

  <div id="state-loading"><p>Verifying your link…</p></div>

  <div id="state-invalid">
    <h1>Link invalid</h1>
    <p>This link is not valid. If you believe this is a mistake, please contact the GripTape team.</p>
  </div>

  <div id="state-form">
    <h1>Orientation Call</h1>
    <p>Hi <span id="champion-name"></span>! Please complete this form after your orientation call with your challenger.</p>

    <form id="orientation-form">
      <label for="youth-select">Select your challenger</label>
      <select id="youth-select" name="youth_id" required>
        <option value="">— select —</option>
      </select>

      <div id="reflection-questions"></div>
      <div id="satisfaction-questions"></div>

      <button type="submit" id="submit-btn">Submit</button>
    </form>

    <div id="status"></div>
  </div>

  <div id="state-success">
    <h1>Done</h1>
    <p>Orientation call recorded. Thank you!</p>
  </div>

  <script>
    // Edit these arrays to add, remove, or reorder questions — no other changes needed.

    const REFLECTION_QUESTIONS = [
      { key: 'vision',           label: 'What is your overall vision for your Learning Challenge? In a sentence or two, what do you want to achieve?', required: true },
      { key: 'goals',            label: 'What are three or four goals you have for your Learning Challenge?',                                           required: true },
      { key: 'achievement_plan', label: 'How do you plan to achieve your goals?',                                                                       required: true },
      { key: 'grant_use',        label: 'What do you plan to use this grant for? What do you think you\'ll spend the money on?',                        required: true },
      { key: 'success_vision',   label: 'If you jumped 10 weeks into the future and were reflecting on your Challenge, what would success look like?',  required: true },
      { key: 'challenge_title',  label: 'What title do you want to give your Learning Challenge?',                                                       required: true },
      { key: 'start_date',       label: 'When do you want to start your Challenge?',                                                                     required: true },
      { key: 'end_date',         label: 'When will you complete your Challenge?',                                                                        required: true },
      { key: 'checkin_schedule', label: 'What\'s a good day and time for our check-in calls?',                                                           required: true },
    ];

    const SATISFACTION_QUESTIONS = [];

    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    function showState(id) {
      ['state-loading', 'state-invalid', 'state-form', 'state-success'].forEach(function(s) {
        document.getElementById(s).style.display = (s === id) ? 'block' : 'none';
      });
    }

    function buildQuestions() {
      var reflectionEl = document.getElementById('reflection-questions');
      REFLECTION_QUESTIONS.forEach(function(q) {
        var label = document.createElement('label');
        label.htmlFor = q.key;
        label.textContent = q.label;
        var textarea = document.createElement('textarea');
        textarea.id = q.key;
        textarea.name = q.key;
        if (q.required) textarea.required = true;
        reflectionEl.appendChild(label);
        reflectionEl.appendChild(textarea);
      });

      var satisfactionEl = document.getElementById('satisfaction-questions');
      SATISFACTION_QUESTIONS.forEach(function(q) {
        var label = document.createElement('label');
        label.htmlFor = q.key;
        label.textContent = q.label;
        satisfactionEl.appendChild(label);

        if (q.type === 'rating') {
          var select = document.createElement('select');
          select.id = q.key;
          select.name = q.key;
          if (q.required) select.required = true;
          var placeholder = document.createElement('option');
          placeholder.value = '';
          placeholder.textContent = '— select —';
          select.appendChild(placeholder);
          [1, 2, 3, 4, 5].forEach(function(n) {
            var opt = document.createElement('option');
            opt.value = String(n);
            opt.textContent = String(n);
            select.appendChild(opt);
          });
          satisfactionEl.appendChild(select);
        } else {
          var textarea = document.createElement('textarea');
          textarea.id = q.key;
          textarea.name = q.key;
          if (q.required) textarea.required = true;
          satisfactionEl.appendChild(textarea);
        }
      });
    }

    async function init() {
      showState('state-loading');

      if (!token) {
        showState('state-invalid');
        return;
      }

      try {
        var enc = encodeURIComponent(token);
        var tokenRes  = await fetch('/api/check-champion-token?token=' + enc);
        var youthRes  = await fetch('/api/champion-youth-list?token=' + enc);

        var tokenData = await tokenRes.json();
        if (!tokenData.valid) {
          showState('state-invalid');
          return;
        }

        var youthData = await youthRes.json();
        if (!youthData.valid) {
          showState('state-invalid');
          return;
        }

        document.getElementById('champion-name').textContent = tokenData.first_name;

        var select = document.getElementById('youth-select');
        youthData.youth.forEach(function(y) {
          var opt = document.createElement('option');
          opt.value = y.id;
          opt.textContent = y.first_name + ' ' + y.last_name;
          select.appendChild(opt);
        });

        buildQuestions();
        showState('state-form');

      } catch (err) {
        showState('state-invalid');
      }
    }

    document.getElementById('orientation-form').addEventListener('submit', async function(e) {
      e.preventDefault();

      var btn    = document.getElementById('submit-btn');
      var status = document.getElementById('status');
      btn.disabled = true;
      status.textContent = '';
      status.className   = '';

      var youth_id  = document.getElementById('youth-select').value;
      var responses = {};
      REFLECTION_QUESTIONS.concat(SATISFACTION_QUESTIONS).forEach(function(q) {
        var el = document.getElementById(q.key);
        if (el) responses[q.key] = el.value.trim();
      });

      try {
        var res = await fetch('/api/orientation-submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: token, youth_id: youth_id, responses: responses }),
        });
        var data = await res.json();

        if (data.success) {
          showState('state-success');
        } else if (data.error === 'already_submitted') {
          status.textContent = data.message;
          status.className   = 'warning';
          btn.disabled = false;
        } else {
          status.textContent = 'Something went wrong. Please try again.';
          status.className   = 'error';
          btn.disabled = false;
        }
      } catch (err) {
        status.textContent = 'Something went wrong. Please try again.';
        status.className   = 'error';
        btn.disabled = false;
      }
    });

    init();
  </script>
</body>
</html>
