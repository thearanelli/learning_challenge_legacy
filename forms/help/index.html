<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Get Help — GripTape Learning Challenge</title>
  <style>
    body { font-family: sans-serif; max-width: 540px; margin: 60px auto; padding: 0 20px; color: #222; }
    h1 { font-size: 1.4rem; margin-bottom: 8px; }
    p { line-height: 1.6; color: #444; }
    label { display: block; margin-top: 20px; font-weight: 600; }
    .hint { display: block; font-size: 0.875rem; font-weight: 400; color: #666; margin-top: 2px; }
    input[type="text"], select, textarea { width: 100%; margin-top: 6px; padding: 10px; font-size: 1rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    textarea { min-height: 120px; resize: vertical; }
    button { margin-top: 20px; padding: 12px 24px; font-size: 1rem; background: #1a1a1a; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #status { margin-top: 16px; font-size: 0.95rem; }
    .error { color: #c00; }
    .success { color: #060; }
  </style>
</head>
<body>

  <h1>Get help</h1>
  <p>Fill out the form below and Thea will get back to you shortly.</p>

  <form id="help-form">
    <label for="name">Name</label>
    <input type="text" id="name" name="name" required />

    <label for="contact">
      Email or phone number
      <span class="hint">We'll use this to get back to you</span>
    </label>
    <input type="text" id="contact" name="contact" required />

    <label for="role">I am a…</label>
    <select id="role" name="role" required>
      <option value="">— select —</option>
      <option value="Youth in the program">Youth in the program</option>
      <option value="Champion (mentor)">Champion (mentor)</option>
    </select>

    <label for="message">How can we help?</label>
    <textarea id="message" name="message" placeholder="Describe what you need help with" required></textarea>

    <button type="submit" id="submit-btn">Send message</button>
  </form>

  <div id="status"></div>

  <script>
    document.getElementById('help-form').addEventListener('submit', async function(e) {
      e.preventDefault();

      var btn    = document.getElementById('submit-btn');
      var status = document.getElementById('status');

      var name    = document.getElementById('name').value.trim();
      var contact = document.getElementById('contact').value.trim();
      var role    = document.getElementById('role').value;
      var message = document.getElementById('message').value.trim();

      btn.disabled    = true;
      btn.textContent = 'Sending…';
      status.textContent = '';
      status.className   = '';

      try {
        var res  = await fetch('/api/help-submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, contact, role, message }),
        });
        var data = await res.json();

        if (data.success) {
          document.getElementById('help-form').reset();
          status.textContent = 'We got your message. Thea will be in touch with you shortly.';
          status.className   = 'success';
        } else {
          status.textContent = 'Something went wrong. Please email thea@griptape.org directly.';
          status.className   = 'error';
        }
      } catch {
        status.textContent = 'Something went wrong. Please email thea@griptape.org directly.';
        status.className   = 'error';
      }

      btn.disabled    = false;
      btn.textContent = 'Send message';
    });
  </script>
</body>
</html>
