<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Champion Registration — GripTape Learning Challenge</title>
  <style>
    body { font-family: sans-serif; max-width: 540px; margin: 60px auto; padding: 0 20px; color: #222; }
    h1 { font-size: 1.4rem; margin-bottom: 8px; }
    p { line-height: 1.6; color: #444; }
    label { display: block; margin-top: 20px; font-weight: 600; }
    input[type="text"], input[type="tel"], textarea {
      width: 100%; margin-top: 6px; padding: 10px; font-size: 1rem;
      border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;
    }
    textarea { min-height: 120px; resize: vertical; }
    button { margin-top: 24px; padding: 12px 24px; font-size: 1rem; background: #1a1a1a; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #status { margin-top: 16px; font-size: 0.95rem; }
    .error { color: #c00; }
    #state-loading, #state-invalid, #state-form, #state-success { display: none; }
  </style>
</head>
<body>

  <div id="state-loading"><p>Verifying your link…</p></div>

  <div id="state-invalid">
    <h1>Link invalid</h1>
    <p>This registration link is not valid. Please contact the GripTape team.</p>
  </div>

  <div id="state-form">
    <h1>Champion Registration</h1>
    <p>Welcome, <span id="champion-name"></span>! Complete your profile to get started.</p>

    <form id="register-form">
      <label for="phone">Phone number</label>
      <input type="tel" id="phone" name="phone" placeholder="212-555-0100" required />

      <label for="bio">Your bio <span style="font-weight:400;color:#666">(tell youth about your background and passion)</span></label>
      <textarea id="bio" name="bio" required></textarea>

      <button type="submit" id="submit-btn">Complete Registration</button>
    </form>

    <div id="status"></div>
  </div>

  <div id="state-success">
    <h1>You're registered!</h1>
    <p>Welcome to GripTape. The team will be in touch when you're matched with a challenger.</p>
  </div>

  <script>
    var params = new URLSearchParams(window.location.search);
    var token  = params.get('token');

    function showState(id) {
      ['state-loading', 'state-invalid', 'state-form', 'state-success'].forEach(function(s) {
        document.getElementById(s).style.display = (s === id) ? 'block' : 'none';
      });
    }

    async function init() {
      showState('state-loading');

      if (!token) {
        showState('state-invalid');
        return;
      }

      try {
        var res  = await fetch('/api/check-registration-token?token=' + encodeURIComponent(token));
        var data = await res.json();

        if (!data.valid) {
          showState('state-invalid');
          return;
        }

        document.getElementById('champion-name').textContent = data.first_name;

        // Pre-fill phone if already stored
        if (data.phone) document.getElementById('phone').value = data.phone;
        if (data.bio)   document.getElementById('bio').value   = data.bio;

        showState('state-form');
      } catch (err) {
        showState('state-invalid');
      }
    }

    document.getElementById('register-form').addEventListener('submit', async function(e) {
      e.preventDefault();

      var btn    = document.getElementById('submit-btn');
      var status = document.getElementById('status');
      btn.disabled = true;
      status.textContent = '';
      status.className   = '';

      var phone = document.getElementById('phone').value.trim();
      var bio   = document.getElementById('bio').value.trim();

      try {
        var res  = await fetch('/api/champion-register-submit', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ token: token, phone: phone, bio: bio }),
        });
        var data = await res.json();

        if (data.success) {
          showState('state-success');
        } else {
          status.textContent = 'Something went wrong. Please try again.';
          status.className   = 'error';
          btn.disabled = false;
        }
      } catch (err) {
        status.textContent = 'Something went wrong. Please try again.';
        status.className   = 'error';
        btn.disabled = false;
      }
    });

    init();
  </script>
</body>
</html>
